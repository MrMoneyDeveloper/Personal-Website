---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="theme-color" content="#060b13" />
  <title>{{ page.title | default: site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  <div class="site-atmosphere" aria-hidden="true">
    <div id="vanta-bg"></div>
    <div class="noise"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="bloom bloom-a"></div>
    <div class="bloom bloom-b"></div>
  </div>

  <div class="scroll-rail" aria-hidden="true">
    <span class="scroll-progress"></span>
  </div>

  <div class="site-frame">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="{{ '/' | relative_url }}">Farhaan Buckas</a>
        <nav id="site-nav" class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/about.html' | relative_url }}">About</a>
          <a href="{{ '/experience.html' | relative_url }}">Experience</a>
          <a href="{{ '/projects.html' | relative_url }}">Projects</a>
          <a href="{{ '/skills.html' | relative_url }}">Skills</a>
          <a href="{{ '/certifications.html' | relative_url }}">Certifications</a>
          <a href="{{ '/contact.html' | relative_url }}">Contact</a>
        </nav>
        <div class="nav-controls">
          <button class="sound-toggle" type="button" aria-pressed="false" aria-label="Enable interface sound">
            <span class="sound-toggle__dot" aria-hidden="true"></span>
            <span class="sound-toggle__label">Sound Off</span>
          </button>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
        </div>
      </div>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <p>&copy; {{ 'now' | date: '%Y' }} Mohammed Farhaan Buckas</p>
        <p>Customer solutions, Zendesk implementation, automation, AI workflows, and systems delivery.</p>
      </div>
    </footer>
  </div>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/vanta/0.5.24/vanta.net.min.js"></script>
  <script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
